<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atual Fitness Estoque</title>
  <meta name="theme-color" content="#171717">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <style>
    :root{--ink:#171717;--muted:#666;--line:#e8e5e1;--soft:#f7f6f4;--orange:#ff6b00;--ok:#16834a;--warn:#a16207;--danger:#b42318}*{box-sizing:border-box}body{margin:0;background:var(--soft);color:var(--ink);font-family:Inter,Segoe UI,Arial,sans-serif}button,input,select,textarea{font:inherit}.app{display:grid;min-height:100vh;grid-template-columns:260px 1fr}.side{background:#fff;border-right:1px solid var(--line);padding:22px;position:sticky;top:0;height:100vh}.brand{display:flex;gap:12px;align-items:center;margin-bottom:28px}.mark{width:46px;height:46px;border-radius:8px;background:var(--ink);color:var(--orange);display:grid;place-items:center;font-weight:900}.brand b{display:block}.brand span{font-size:12px;color:var(--muted);font-weight:700}.nav{display:grid;gap:6px}.nav button{border:0;background:transparent;text-align:left;padding:12px;border-radius:8px;font-weight:850;color:#555}.nav button.active,.nav button:hover{background:var(--ink);color:#fff}.top{height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:2}.top h1{margin:0;font-size:18px}.status{display:flex;align-items:center;gap:8px;border-radius:8px;padding:8px 10px;background:#eef8f1;color:var(--ok);font-size:12px;font-weight:900}.status.off{background:#fff7df;color:var(--warn)}.content{padding:24px;max-width:1280px;margin:0 auto}.title{display:flex;justify-content:space-between;gap:12px;align-items:end;margin-bottom:18px}.title h2{font-size:27px;margin:0}.title p{margin:4px 0 0;color:var(--muted);font-size:14px}.grid{display:grid;gap:14px}.metrics{grid-template-columns:repeat(4,1fr);margin-bottom:14px}.card{background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 26px rgba(23,23,23,.06)}.metric{padding:17px}.metric span{font-size:13px;color:var(--muted);font-weight:800}.metric strong{display:block;font-size:27px;margin-top:8px}.panel{padding:18px}.split{grid-template-columns:1fr 1fr}.btn{height:40px;border:0;border-radius:8px;background:var(--orange);color:#fff;font-weight:900;padding:0 14px;cursor:pointer}.btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}.btn.danger{background:var(--danger)}.field{height:40px;width:100%;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 11px;outline:none}.field:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,107,0,.12)}textarea.field{height:78px;padding-top:10px}.form{display:grid;gap:10px;grid-template-columns:repeat(4,1fr)}.form .full{grid-column:1/-1}.toolbar{display:grid;grid-template-columns:1.4fr repeat(3,.7fr) auto;gap:10px;margin-bottom:14px}.tablewrap{overflow:auto}table{width:100%;min-width:850px;border-collapse:collapse}th{background:#f5f4f2;color:#777;text-align:left;text-transform:uppercase;font-size:11px;padding:12px}td{padding:12px;border-top:1px solid var(--line);font-size:14px}.sku{font-weight:950;color:var(--orange)}.tag{display:inline-flex;border-radius:7px;padding:6px 8px;font-size:12px;font-weight:900;background:#f4f2ef}.tag.ok{background:#eef8f1;color:var(--ok)}.tag.warn{background:#fff7df;color:var(--warn)}.tag.danger{background:#fff0ee;color:var(--danger)}.row{display:flex;justify-content:space-between;gap:10px;padding:12px 0;border-top:1px solid var(--line)}.hidden{display:none}.mobilebar{display:none}.notice{padding:12px;border-radius:8px;background:#fff7df;color:var(--warn);font-weight:800;font-size:13px;margin-bottom:14px}@media(max-width:900px){.app{display:block}.side{display:none}.content{padding:16px 12px 76px}.metrics,.split,.form{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr 1fr}.toolbar .wide{grid-column:1/-1}.title{align-items:start;flex-direction:column}.mobilebar{display:grid;grid-template-columns:repeat(4,1fr);position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);z-index:5}.mobilebar button{border:0;background:#fff;padding:10px 4px;font-size:11px;font-weight:850;color:#666}.mobilebar button.active{color:var(--orange)}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side"><div class="brand"><div class="mark">ATF</div><div><b>Atual Fitness</b><span>Estoque local</span></div></div><nav class="nav"><button data-page="dashboard" class="active">Dashboard</button><button data-page="produtos">Produtos</button><button data-page="estoque">Estoque</button><button data-page="historico">Historico</button></nav></aside>
  <main><header class="top"><div><h1>Atual Fitness</h1></div><div id="status" class="status">Online</div></header><div class="content">
    <section id="dashboard" class="page"></section>
    <section id="produtos" class="page hidden"></section>
    <section id="estoque" class="page hidden"></section>
    <section id="historico" class="page hidden"></section>
  </div></main>
</div>
<nav class="mobilebar"><button data-page="dashboard" class="active">Inicio</button><button data-page="produtos">Produtos</button><button data-page="estoque">Estoque</button><button data-page="historico">Historico</button></nav>
<script>
const KEY_PRODUCTS='atf.products.v1',KEY_MOVES='atf.moves.v1';
const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));
const money=v=>Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const read=(k,f)=>{try{return JSON.parse(localStorage.getItem(k))||f}catch{return f}};
const write=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const products=()=>read(KEY_PRODUCTS,[]),moves=()=>read(KEY_MOVES,[]);
function seed(){if(products().length)return;write(KEY_PRODUCTS,[{id:crypto.randomUUID(),name:'Legging Power Cintura Alta',sku:'ATF-LEG-PRE-M-001',cat:'Legging',model:'Cintura Alta',color:'Preto',size:'M',qty:12,min:3,cost:54.9,price:119.9,status:'ACTIVE'},{id:crypto.randomUUID(),name:'Top Flex Sem Costura',sku:'ATF-TOP-LAR-P-001',cat:'Top',model:'Sem Costura',color:'Laranja',size:'P',qty:2,min:4,cost:31.5,price:79.9,status:'ACTIVE'},{id:crypto.randomUUID(),name:'Short Run Bolsos Laterais',sku:'ATF-SHO-CIN-G-001',cat:'Short',model:'Bolsos Laterais',color:'Cinza',size:'G',qty:0,min:2,cost:42,price:89.9,status:'SOLD_OUT'}]);write(KEY_MOVES,[])}
function sku(cat,color,size){const c=(cat||'PRO').slice(0,3).toUpperCase(),co=(color||'COR').slice(0,3).toUpperCase(),s=(size||'U').toUpperCase();const prefix=`ATF-${c}-${co}-${s}`;const n=products().filter(p=>p.sku.startsWith(prefix)).length+1;return `${prefix}-${String(n).padStart(3,'0')}`}
function status(p){if(p.qty<=0)return'<span class="tag danger">Esgotado</span>';if(p.qty<=p.min)return'<span class="tag warn">Baixo</span>';return'<span class="tag ok">Ativo</span>'}
function saveProduct(e){e.preventDefault();const f=new FormData(e.target);const p={id:crypto.randomUUID(),name:f.get('name'),cat:f.get('cat'),model:f.get('model'),color:f.get('color'),size:f.get('size'),qty:Number(f.get('qty')),min:Number(f.get('min')||1),cost:Number(f.get('cost')||0),price:Number(f.get('price')||0),sku:sku(f.get('cat'),f.get('color'),f.get('size'))};p.status=p.qty>0?'ACTIVE':'SOLD_OUT';write(KEY_PRODUCTS,[p,...products()]);addMove(p,'IN',p.qty,0,p.qty,'Estoque inicial');e.target.reset();render()}
function addMove(p,type,quantity,prev,next,reason){const m={id:crypto.randomUUID(),date:new Date().toISOString(),productId:p.id,sku:p.sku,name:p.name,type,quantity,prev,next,reason};write(KEY_MOVES,[m,...moves()])}
function moveStock(e){e.preventDefault();const f=new FormData(e.target),id=f.get('productId'),type=f.get('type'),q=Number(f.get('qty')),reason=f.get('reason');let list=products();const i=list.findIndex(p=>p.id===id);if(i<0)return alert('Produto nao encontrado');const p=list[i],prev=p.qty;let next=prev;if(type==='IN')next+=q;if(type==='OUT'||type==='CORRECTION')next-=q;if(type==='ADJUSTMENT')next=q;if(next<0)return alert('Estoque insuficiente');list[i]={...p,qty:next,status:next>0?'ACTIVE':'SOLD_OUT'};write(KEY_PRODUCTS,list);addMove(list[i],type,q,prev,next,reason);e.target.reset();render()}
function renderDashboard(){const ps=products(),ms=moves(),stock=ps.reduce((s,p)=>s+p.qty,0),value=ps.reduce((s,p)=>s+p.qty*p.cost,0),low=ps.filter(p=>p.qty>0&&p.qty<=p.min),zero=ps.filter(p=>p.qty===0);$('#dashboard').innerHTML=`<div class="title"><div><h2>Dashboard</h2><p>Controle local salvo neste aparelho.</p></div><button class="btn secondary" onclick="exportData()">Exportar backup</button></div><div class="notice">Este app funciona offline. Para usar em outro aparelho com os mesmos dados, exporte e importe backup.</div><div class="grid metrics"><div class="card metric"><span>Produtos</span><strong>${ps.length}</strong></div><div class="card metric"><span>Pecas em estoque</span><strong>${stock}</strong></div><div class="card metric"><span>Valor estimado</span><strong>${money(value)}</strong></div><div class="card metric"><span>Baixo/zerado</span><strong>${low.length}/${zero.length}</strong></div></div><div class="grid split"><div class="card panel"><h3>Alertas</h3>${[...low,...zero].slice(0,6).map(p=>`<div class="row"><div><b>${p.name}</b><br><span class="sku">${p.sku}</span></div>${status(p)}</div>`).join('')||'<p>Nenhum alerta.</p>'}</div><div class="card panel"><h3>Ultimas movimentacoes</h3>${ms.slice(0,6).map(m=>`<div class="row"><div><b>${m.name}</b><br><span>${new Date(m.date).toLocaleString('pt-BR')} · ${m.reason}</span></div><span class="tag">${m.type} ${m.quantity}</span></div>`).join('')||'<p>Sem movimentacoes.</p>'}</div></div>`}
function renderProducts(){const ps=products();$('#produtos').innerHTML=`<div class="title"><div><h2>Produtos</h2><p>Cadastro com SKU automatico.</p></div></div><div class="card panel"><form class="form" onsubmit="saveProduct(event)"><input class="field" name="name" placeholder="Nome" required><input class="field" name="cat" placeholder="Categoria" required><input class="field" name="model" placeholder="Modelo"><input class="field" name="color" placeholder="Cor" required><input class="field" name="size" placeholder="Tamanho" required><input class="field" type="number" name="qty" placeholder="Quantidade" required><input class="field" type="number" name="min" placeholder="Estoque minimo"><input class="field" type="number" step="0.01" name="cost" placeholder="Custo"><input class="field" type="number" step="0.01" name="price" placeholder="Venda"><div class="full"><button class="btn">Salvar produto</button></div></form></div><br><div class="card tablewrap"><table><thead><tr><th>Produto</th><th>SKU</th><th>Categoria</th><th>Cor</th><th>Tam.</th><th>Estoque</th><th>Venda</th><th>Status</th></tr></thead><tbody>${ps.map(p=>`<tr><td><b>${p.name}</b><br><span>${p.model||''}</span></td><td class="sku">${p.sku}</td><td>${p.cat}</td><td>${p.color}</td><td>${p.size}</td><td>${p.qty}</td><td>${money(p.price)}</td><td>${status(p)}</td></tr>`).join('')}</tbody></table></div>`}
function renderInventory(){const ps=products();$('#estoque').innerHTML=`<div class="title"><div><h2>Estoque</h2><p>Entrada, saida, ajuste e correcao.</p></div></div><div class="card panel"><form class="form" onsubmit="moveStock(event)"><select class="field full" name="productId" required><option value="">Selecione o produto</option>${ps.map(p=>`<option value="${p.id}">${p.sku} - ${p.name} (${p.qty})</option>`).join('')}</select><select class="field" name="type"><option value="IN">Entrada</option><option value="OUT">Saida</option><option value="ADJUSTMENT">Ajuste</option><option value="CORRECTION">Correcao</option></select><input class="field" type="number" name="qty" placeholder="Quantidade ou saldo" required><input class="field" name="reason" placeholder="Motivo" required><button class="btn">Registrar</button></form></div>`}
function renderHistory(){const ms=moves();$('#historico').innerHTML=`<div class="title"><div><h2>Historico</h2><p>Todas as movimentacoes deste aparelho.</p></div><button class="btn danger" onclick="if(confirm('Apagar todos os dados locais?')){localStorage.clear();seed();render()}">Limpar dados</button></div><div class="card tablewrap"><table><thead><tr><th>Data</th><th>Produto</th><th>Tipo</th><th>Qtd.</th><th>Saldo</th><th>Motivo</th></tr></thead><tbody>${ms.map(m=>`<tr><td>${new Date(m.date).toLocaleString('pt-BR')}</td><td><b>${m.name}</b><br><span class="sku">${m.sku}</span></td><td><span class="tag">${m.type}</span></td><td>${m.quantity}</td><td>${m.prev} → ${m.next}</td><td>${m.reason}</td></tr>`).join('')}</tbody></table></div>`}
function exportData(){const data=JSON.stringify({products:products(),moves:moves(),exportedAt:new Date().toISOString()},null,2);const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));a.download='backup-atual-fitness.json';a.click()}
function render(){renderDashboard();renderProducts();renderInventory();renderHistory();$('#status').textContent=navigator.onLine?'Online':'Offline';$('#status').className='status '+(navigator.onLine?'':'off')}
function go(page){$$('.page').forEach(x=>x.classList.add('hidden'));$('#'+page).classList.remove('hidden');$$('[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===page))}
$$('[data-page]').forEach(b=>b.onclick=()=>go(b.dataset.page));window.addEventListener('online',render);window.addEventListener('offline',render);if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
seed();render();
</script>
</body>
</html>
